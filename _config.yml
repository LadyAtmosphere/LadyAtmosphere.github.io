# Setup
title: Lady Atmosphere
description: 认真做好每一件事
url: https://ladyatmosphere.github.io/
avatar: /xy.jpeg
paginate: 5
permalink: pretty
cover_image: /lorenze.jpeg

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: vszhub
  card: summary
logo: logo.png
social:
  name: Pinya Wang
  links:
   # - https://twitter.com/vszhub
    - https://github.com/LadyAtmosphere
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Pinya Wang
  url: https://github.com/LadyAtmosphere
  email: pinya.wang@nuist.edu.cn

